name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: shareme-windows-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact_name: shareme-darwin-universal
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: shareme-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build desktop on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-desktop.ps1 -Platform "${{ matrix.platform }}"

      - name: Build desktop on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/build-desktop.sh "${{ matrix.platform }}"

      - name: Build desktop on Linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          WAILS_BUILD_TAGS: webkit2_41
        run: ./scripts/build-desktop.sh "${{ matrix.platform }}"

      - name: Build agent on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-agent.ps1 -Output "dist\shareme-agent.exe"

      - name: Build universal agent on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./scripts/build-agent.sh "$PWD/dist/shareme-agent-native"
          (cd backend && GOOS=darwin GOARCH=amd64 GOTELEMETRY=off go build -o "$PWD/../dist/shareme-agent-amd64" ./cmd/shareme-agent)
          (cd backend && GOOS=darwin GOARCH=arm64 GOTELEMETRY=off go build -o "$PWD/../dist/shareme-agent-arm64" ./cmd/shareme-agent)
          lipo -create -output dist/shareme-agent dist/shareme-agent-amd64 dist/shareme-agent-arm64

      - name: Build agent on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/build-agent.sh "$PWD/dist/shareme-agent"

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets, package | Out-Null
          Copy-Item -LiteralPath backend\build\bin\shareme.exe -Destination package\shareme.exe
          Copy-Item -LiteralPath dist\shareme-agent.exe -Destination package\shareme-agent.exe
          Compress-Archive -Path package\* -DestinationPath "release-assets\${{ matrix.artifact_name }}.zip" -Force

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets package
          cp -R backend/build/bin/shareme.app package/
          cp dist/shareme-agent package/shareme-agent
          (cd package && ditto -c -k --sequesterRsrc . "../release-assets/${{ matrix.artifact_name }}.zip")

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets package
          cp backend/build/bin/shareme package/shareme
          cp dist/shareme-agent package/shareme-agent
          tar -C package -czf "release-assets/${{ matrix.artifact_name }}.tar.gz" .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*
